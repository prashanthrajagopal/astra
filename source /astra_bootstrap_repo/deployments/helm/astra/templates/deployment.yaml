
apiVersion: apps/v1
kind: Deployment
metadata:
  name: astra-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: astra-api
  template:
    metadata:
      labels:
        app: astra-api
    spec:
      containers:
      - name: api
        image: astra/api:latest
        ports:
        - containerPort: 8080
