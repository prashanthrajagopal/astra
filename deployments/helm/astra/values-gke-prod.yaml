# GCP Production tier (~$400-700/mo)
replicaCount: 2

image:
  repository: us-central1-docker.pkg.dev/astra1-490021/astra-repo/astra
  pullPolicy: Always
  tag: latest

service:
  name: api-gateway
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9090
  agentGrpcPort: 9091
  memoryGrpcPort: 9092
  llmGrpcPort: 9093
  identityAddr: "http://astra-identity:8085"
  accessControlAddr: "http://astra-access-control:8086"
  goalServiceAddr: "http://astra-goal-service:8088"
  workerManagerAddr: "http://astra-worker-manager:8082"
  costTrackerAddr: "http://astra-cost-tracker:8090"
  llmGrpcAddr: "astra-llm-router:9093"

postgres:
  host: "10.61.1.3"
  port: 5432
  database: astra
  user: astra
  password: astra

redis:
  addr: "10.128.164.147:6379"

memcached:
  addr: "10.61.0.3:11211"

workspace:
  root: /workspace

jwt:
  secret: "CHANGE-ME-IN-PRODUCTION"

autoApprovePlans: "false"

llm:
  defaultProvider: "gemini"

resources:
  limits:
    cpu: "1"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

tls:
  enabled: false
