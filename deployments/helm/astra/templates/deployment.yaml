apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.grpcPort }}
              name: grpc
            - containerPort: {{ .Values.service.httpPort }}
              name: http
          env:
            - name: POSTGRES_HOST
              value: {{ .Values.postgres.host | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgres.port | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: REDIS_ADDR
              value: {{ .Values.redis.addr | quote }}
            - name: MEMCACHED_ADDR
              value: {{ .Values.memcached.addr | quote }}
            - name: GRPC_PORT
              value: {{ .Values.service.grpcPort | quote }}
            - name: HTTP_PORT
              value: {{ .Values.service.httpPort | quote }}
            - name: ASTRA_TLS_ENABLED
              value: {{ .Values.tls.enabled | quote }}
            - name: ASTRA_TLS_CERT_FILE
              value: {{ .Values.tls.certFile | quote }}
            - name: ASTRA_TLS_KEY_FILE
              value: {{ .Values.tls.keyFile | quote }}
            - name: ASTRA_TLS_CA_FILE
              value: {{ .Values.tls.caFile | quote }}
            - name: ASTRA_TLS_SERVER_NAME
              value: {{ .Values.tls.serverName | quote }}
            - name: ASTRA_TLS_INSECURE_SKIP_VERIFY
              value: {{ .Values.tls.insecureSkipVerify | quote }}
            - name: ASTRA_VAULT_ADDR
              value: {{ .Values.vault.addr | quote }}
            - name: ASTRA_VAULT_TOKEN
              value: {{ .Values.vault.token | quote }}
            - name: ASTRA_VAULT_PATH
              value: {{ .Values.vault.path | quote }}
          {{- if and .Values.tls.enabled .Values.tls.secretName }}
          volumeMounts:
            - name: astra-tls
              mountPath: /etc/astra/tls
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- if and .Values.tls.enabled .Values.tls.secretName }}
      volumes:
        - name: astra-tls
          secret:
            secretName: {{ .Values.tls.secretName | quote }}
      {{- end }}
