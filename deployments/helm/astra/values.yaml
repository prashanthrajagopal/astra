replicaCount: 1

image:
  repository: astra
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  grpcPort: 9090
  httpPort: 8080

resources:
  limits:
    cpu: "1"
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 128Mi

postgres:
  host: postgres
  port: 5432
  database: astra
  user: astra

redis:
  addr: redis:6379

memcached:
  addr: memcached:11211

workspace:
  root: /workspace

jwt:
  secret: astra-dev-secret

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

tls:
  enabled: false
  certFile: /etc/astra/tls/tls.crt
  keyFile: /etc/astra/tls/tls.key
  caFile: /etc/astra/tls/ca.crt
  serverName: ""
  insecureSkipVerify: false
  secretName: ""

vault:
  enabled: false
  addr: ""
  token: ""
  path: secret/data/astra

# Agent platform hardening (execution-worker: GCS_BUCKET + ARTIFACT_DIR; llm-router: ASTRA_LLM_MAX_INFLIGHT)
gcsBucket: ""
artifactDir: "/workspace/artifacts"
llmMaxInflight: ""
