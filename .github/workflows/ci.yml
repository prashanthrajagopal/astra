name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify deps
        run: go mod download && go mod verify

      - name: Vet
        run: go vet ./...

      # Prebuilt golangci-lint binaries lag Go; go.mod is 1.25 — compile linter with same toolchain
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: |
          ASTRA_VERSION="$(cat VERSION 2>/dev/null || echo dev)"
          GIT_COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo unknown)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X astra/pkg/version.Version=${ASTRA_VERSION} -X astra/pkg/version.GitCommit=${GIT_COMMIT} -X astra/pkg/version.BuildDate=${BUILD_DATE}"
          go build -ldflags "$LDFLAGS" ./...

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Helm template check
        run: helm template astra deployments/helm/astra >/dev/null
